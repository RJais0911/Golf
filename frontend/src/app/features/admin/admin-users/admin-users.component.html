<section class="page-title">
  <h1>Manage Users</h1>
  <p class="muted">Activate or deactivate user access and view their current subscription state.</p>
</section>

<section class="glass-card">
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Subscription</th>
        <th>Charity</th>
        <th>Active</th>
      </tr>
    </thead>
    <tbody>
      @for (user of users; track user._id || user.id) {
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.subscriptionStatus }}</td>
          <td>{{ charityName(user.charityId) }}</td>
          <td>
            <button class="secondary-btn" type="button" (click)="toggleUser(user)">
              {{ user.isActive ? 'Deactivate' : 'Activate' }}
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</section>
